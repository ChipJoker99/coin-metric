name: Coin Recognition CI Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/unit

      - name: Run integration tests
        run: pytest tests/integration

      - name: Run retrieval tests
        run: pytest tests/retrieval

      - name: Run ML sanity tests
        run: pytest tests/ml_sanity

      - name: Run regression tests
        run: pytest tests/regression

      - name: Run performance tests
        run: pytest tests/performance

      - name: Smoke test inference pipeline
        run: |
          python -c "from src.inference.predict import run_smoke_test; run_smoke_test()"